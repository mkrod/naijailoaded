<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Server Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    .container-ecommerce {
      font-family: "Segoe UI", Arial, sans-serif;
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      right: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: linear-gradient(135deg, #6a11cb, #2575fc);
      color: #fff;
      padding: 1rem;
      text-align: center;
    }

    .logo {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      overflow: hidden;
      margin-bottom: 1rem;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    h1 {
      font-size: 2.8rem;
      margin-bottom: 0.5rem;
    }

    p {
      font-size: 1.2rem;
      margin-bottom: 0.5rem;
    }

    .server-url,
    .status {
      margin: 0.5rem 0;
      font-weight: bold;
      padding: 0.4rem 0.8rem;
      border-radius: 5px;
      display: inline-block;
    }

    .server-url {
      background: rgba(255, 255, 255, 0.2);
      font-size: 1rem;
    }

    .status {
      background: rgba(255, 255, 255, 0.2);
      font-size: 1rem;
    }

    .upload-list {
      margin-top: 1.5rem;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1rem;
      max-width: 90%;
    }

    .upload-item {
      background: rgba(255, 255, 255, 0.15);
      padding: 0.5rem;
      border-radius: 5px;
      text-align: center;
      flex: 1 0 120px;
      max-width: 150px;
      overflow: hidden;
    }

    .upload-item img,
    .upload-item video,
    .upload-item audio {
      width: 100%;
      height: auto;
      border-radius: 3px;
    }

    a {
      margin-top: 1.5rem;
      text-decoration: none;
      color: #2575fc;
      background: #fff;
      padding: 0.5rem 1.5rem;
      border-radius: 6px;
      font-weight: bold;
      transition: .3s;
    }

    a:hover {
      background: #f0f0f0;
    }

    @media(max-width:480px) {
      h1 {
        font-size: 2rem;
      }

      p,
      .server-url,
      .status {
        font-size: 0.9rem;
      }

      a {
        padding: 0.4rem 1rem;
        font-size: 0.9rem;
      }
    }
  </style>
</head>

<body>
  <div class="container-ecommerce">
    <div class="logo">
      <img src="/upload/logo.png" alt="Logo">
    </div>

    <h1>Welcome!</h1>
    <p>Your server is running successfully.</p>
    <div class="server-url" id="serverUrl">Detecting URL...</div>
    <div class="status" id="serverStatus">Checking server status...</div>
    <a href="/api">Go to API</a>

    <h2 style="margin-top:2rem;">Uploaded Files</h2>
    <div class="upload-list" id="uploadList">
      <!-- Files from /upload will appear here -->
    </div>

  </div>
  <script>
    // Show server URL dynamically
    const serverUrlEl = document.getElementById("serverUrl");
    const protocol = window.location.protocol;
    const host = window.location.host;
    serverUrlEl.textContent = `${protocol}//${host}`;

    // Server status
    async function checkServerStatus() {
      const statusEl = document.getElementById("serverStatus");
      try {
        const res = await fetch("/api/health");
        if (res.ok) {
          statusEl.textContent = "✅ Server is online";
          statusEl.style.background = "rgba(0,255,0,0.2)";
        } else {
          statusEl.textContent = "⚠️ Server response error";
          statusEl.style.background = "rgba(255,165,0,0.2)";
        }
      } catch {
        statusEl.textContent = "❌ Server offline";
        statusEl.style.background = "rgba(255,0,0,0.2)";
      }
    }
    checkServerStatus();
    setInterval(checkServerStatus, 5000);

    // Fetch uploaded files
    async function loadUploads() {
      const listEl = document.getElementById("uploadList");
      try {
        const res = await fetch("/upload"); // express.static serves directory
        if (res.ok) {
          // try to parse HTML directory listing (works with express static)
          const text = await res.text();
          const parser = new DOMParser();
          const doc = parser.parseFromString(text, "text/html");
          const links = Array.from(doc.querySelectorAll("a")).map(a => a.getAttribute("href")).filter(h => h && !h.startsWith("?"));
          listEl.innerHTML = links.map(file => {
            const ext = file.split(".").pop().toLowerCase();
            if (["png", "jpg", "jpeg", "gif", "webp"].includes(ext)) return `<div class="upload-item"><img src="/upload/${file}" alt="${file}"><div>${file}</div></div>`;
            if (["mp4", "webm", "ogg"].includes(ext)) return `<div class="upload-item"><video controls src="/upload/${file}"></video><div>${file}</div></div>`;
            if (["mp3", "wav", "ogg"].includes(ext)) return `<div class="upload-item"><audio controls src="/upload/${file}"></audio><div>${file}</div></div>`;
            return `<div class="upload-item">${file}</div>`;
          }).join("");
        }
      } catch (err) {
        listEl.innerHTML = "<p>Unable to load uploaded files</p>";
      }
    }


    loadUploads();
  </script>
</body>

</html>
